<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Usage Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080d18; --surface: #0f172a; --card: #1a2236;
      --border: #263047; --text: #e2e8f0; --text2: #94a3b8; --text3: #4a5568;
      --blue: #60a5fa; --green: #34d399; --purple: #a78bfa;
      --amber: #fbbf24; --orange: #fb923c; --red: #f87171;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; min-height: 100vh; font-size: 14px; }

    /* ── Header ── */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .header h1 span { color: var(--blue); }
    .badge { font-size: 10px; padding: 2px 7px; border-radius: 9999px; background: rgba(96,165,250,.12); color: var(--blue); border: 1px solid rgba(96,165,250,.25); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .last-updated { font-size: 12px; color: var(--text3); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text2); transition: all .15s; }
    .btn:hover { border-color: #3a4a62; color: var(--text); background: #223; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #060d1a; font-weight: 600; }
    .btn.primary:hover { background: #93c5fd; border-color: #93c5fd; }
    .btn-sm { padding: 4px 9px; font-size: 11px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin .8s linear infinite; }

    /* ── Layout ── */
    .main { max-width: 1380px; margin: 0 auto; padding: 22px 24px; }

    /* ── Stat cards ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 18px 20px; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .stat-card.c-blue::after { background: linear-gradient(90deg, var(--blue), #818cf8); }
    .stat-card.c-green::after { background: linear-gradient(90deg, var(--green), #06b6d4); }
    .stat-card.c-purple::after { background: linear-gradient(90deg, var(--purple), #ec4899); }
    .stat-card.c-amber::after { background: linear-gradient(90deg, var(--amber), var(--orange)); }
    .stat-icon { font-size: 18px; margin-bottom: 10px; }
    .stat-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .stat-value { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 5px; letter-spacing: -1px; }
    .stat-card.c-blue .stat-value { color: var(--blue); }
    .stat-card.c-green .stat-value { color: var(--green); }
    .stat-card.c-purple .stat-value { color: var(--purple); }
    .stat-card.c-amber .stat-value { color: var(--amber); }
    .stat-sub { font-size: 11px; color: var(--text3); }

    /* ── Section card ── */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 18px 20px; margin-bottom: 18px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: var(--blue); } .dot-green { background: var(--green); }
    .dot-purple { background: var(--purple); } .dot-amber { background: var(--amber); }
    .section-badge { font-size: 11px; color: var(--text3); background: var(--surface); padding: 2px 8px; border-radius: 5px; border: 1px solid var(--border); }

    /* ── Date range ── */
    .date-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    input[type="date"] { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; color: var(--text); font-size: 12px; cursor: pointer; outline: none; }
    input[type="date"]:focus { border-color: var(--blue); }
    .sep { color: var(--text3); font-size: 12px; }

    /* ── Chart ── */
    .chart-wrap { position: relative; height: 270px; }
    .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .legend-dot.round { border-radius: 50%; }

    /* ── Two column ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    @media (max-width: 780px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th { padding: 7px 12px; text-align: right; color: var(--text3); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th:first-child { text-align: left; }
    td { padding: 9px 12px; text-align: right; border-bottom: 1px solid rgba(38,48,71,.6); color: var(--text2); white-space: nowrap; }
    td:first-child { text-align: left; color: var(--text); font-weight: 500; }
    tr:last-child td { border-bottom: none; font-weight: 700; color: var(--text); }
    tr:last-child td:first-child { color: var(--text3); }
    tr:hover td { background: rgba(255,255,255,.02); }
    .cost-val { color: var(--orange) !important; font-weight: 600; }
    .total-row td { background: rgba(96,165,250,.04); border-top: 1px solid var(--border); }

    /* ── Model tags ── */
    .mtag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; margin: 1px; }
    .mt-sonnet { background: rgba(96,165,250,.15); color: var(--blue); }
    .mt-haiku  { background: rgba(52,211,153,.15); color: var(--green); }
    .mt-opus   { background: rgba(167,139,250,.15); color: var(--purple); }

    /* ── Model breakdown bars ── */
    .model-item { margin-bottom: 14px; }
    .model-item:last-child { margin-bottom: 0; }
    .model-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .model-bar-bg { height: 7px; background: var(--surface); border-radius: 4px; overflow: hidden; }
    .model-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; min-width: 2px; }
    .model-detail { font-size: 11px; color: var(--text3); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── States ── */
    .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 36px; color: var(--text3); font-size: 12px; }
    .empty { text-align: center; padding: 30px; color: var(--text3); font-size: 12px; }
    .error { text-align: center; padding: 20px; color: var(--red); font-size: 12px; }
    .snapshot-bar { background: rgba(251,191,36,.1); border-bottom: 1px solid rgba(251,191,36,.25); padding: 6px 24px; font-size: 12px; color: var(--amber); text-align: center; display: none; }
    .snapshot-bar.show { display: block; }

    /* ── Account bar ── */
    .account-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 0; overflow-x: auto; }
    .acc-btn { flex-shrink: 0; padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .acc-btn:hover { color: var(--text2); }
    .acc-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .acc-btn.all-btn { color: var(--purple); }
    .acc-btn.all-btn.active { color: var(--purple); border-bottom-color: var(--purple); }
    .acc-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
    .acc-status { font-size: 10px; display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
    .acc-online { background: var(--green); }
    .acc-stale { background: var(--amber); }

    /* ── Accounts overview table ── */
    #accountsOverview { display: none; }
  </style>

<body>

<header class="header">
  <div class="header-left">
    <h1>Claude Code <span>Usage</span> Dashboard</h1>
    <span class="badge">ccusage</span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">-</span>
    <button class="btn primary" id="refreshBtn" onclick="loadAll(true)">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      刷新
    </button>
  </div>
</header>
<div class="snapshot-bar" id="snapshotBar">📸 快照模式 — 数据截至 <span id="snapshotTime"></span>，重新运行 <code>node export.js</code> 可更新</div>

<!-- Account selector bar -->
<div class="account-bar" id="accountBar">
  <button class="acc-btn active" data-id="__local__" onclick="selectAccount('__local__')">💻 本机</button>
  <div class="acc-sep"></div>
  <span id="remoteAccBtns"></span>
  <div class="acc-sep"></div>
  <button class="acc-btn all-btn" data-id="__all__" onclick="selectAccount('__all__')">📊 全部汇总</button>
</div>

<main class="main">

  <!-- Stat cards -->
  <div class="stats-grid">
    <div class="stat-card c-blue">
      <div class="stat-label">今日消费</div>
      <div class="stat-value" id="todayCost">—</div>
      <div class="stat-sub" id="todayCostSub">加载中…</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">今日 Tokens</div>
      <div class="stat-value" id="todayTokens">—</div>
      <div class="stat-sub" id="todayTokensSub">加载中…</div>
    </div>
    <div class="stat-card c-purple">
      <div class="stat-label">本月消费</div>
      <div class="stat-value" id="monthCost">—</div>
      <div class="stat-sub" id="monthCostSub">加载中…</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">本月 Tokens</div>
      <div class="stat-value" id="monthTokens">—</div>
      <div class="stat-sub" id="monthTokensSub">加载中…</div>
    </div>
  </div>

  <!-- Daily chart -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-blue"></span>每日用量</div>
      <div class="date-row">
        <input type="date" id="sinceDate">
        <span class="sep">→</span>
        <input type="date" id="untilDate">
        <button class="btn btn-sm" onclick="applyRange()">应用</button>
        <button class="btn btn-sm" onclick="setLast30()">近30天</button>
        <button class="btn btn-sm" onclick="setThisMonth()">本月</button>
      </div>
    </div>
    <div class="chart-wrap" id="dailyChartWrap">
      <div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div>
    </div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Cache Read</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Cache Create</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Output</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Input</div>
      <div class="legend-item"><div class="legend-dot round" style="background:#f97316"></div>Cost ($，右轴)</div>
    </div>
  </div>

  <!-- Weekly + Model breakdown -->
  <div class="two-col">
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="dot dot-green"></span>按周汇总</div>
      </div>
      <div id="weeklyContent"><div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="dot dot-purple"></span>模型用量分布</div>
        <span class="section-badge" id="modelPeriod">今日</span>
      </div>
      <div id="modelContent"><div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div></div>
    </div>
  </div>

  <!-- Monthly -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot dot-amber"></span>按月汇总</div>
    </div>
    <div id="monthlyContent"><div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div></div>
  </div>

  <!-- Accounts overview (visible in All mode) -->
  <div class="section" id="accountsOverview">
    <div class="section-header">
      <div class="section-title"><span class="dot" style="background:var(--green)"></span>账号总览</div>
      <span class="section-badge" id="accountCount">-</span>
    </div>
    <div id="accountsContent"><div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div></div>
  </div>

</main>

<script>
// ── Static mode (window.__CCUSAGE_DATA__ injected by export.js) ───────────────
const __STATIC = window.__CCUSAGE_DATA__ || null;

// ── Multi-account state ───────────────────────────────────────────────────────
let currentAccount = '__local__';
let remoteAccounts = [];   // [{accountId, displayName, lastUpdated, ...}]
let remoteAccountData = {}; // { accountId: fullData }

// Select account tab
function selectAccount(id) {
  currentAccount = id;
  document.querySelectorAll('.acc-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  document.getElementById('accountsOverview').style.display = id === '__all__' ? 'block' : 'none';
  loadAll();
}

// Load list of remote accounts and render tab buttons
async function loadAccountBar() {
  if (__STATIC) return; // static mode: no remote accounts
  try {
    remoteAccounts = await api('/api/accounts');
    const container = document.getElementById('remoteAccBtns');
    if (!remoteAccounts.length) { container.innerHTML = ''; return; }

    container.innerHTML = remoteAccounts.map(acc => {
      const stale = acc.lastUpdated && (Date.now() - new Date(acc.lastUpdated)) > 2 * 3600 * 1000;
      const dot = `<span class="acc-status ${stale ? 'acc-stale' : 'acc-online'}"></span>`;
      return `<button class="acc-btn" data-id="${acc.accountId}" onclick="selectAccount('${acc.accountId}')">${dot}${acc.displayName}</button>`;
    }).join('');

    document.getElementById('accountCount').textContent = `${remoteAccounts.length} 台`;
  } catch {}
}

// Load full data for a specific remote account
async function getRemoteData(accountId) {
  if (remoteAccountData[accountId]) return remoteAccountData[accountId];
  const d = await api(`/api/account/${accountId}`);
  remoteAccountData[accountId] = d;
  return d;
}

// Merge multiple account datasets into one (for "All" view)
function mergeAccounts(dataList) {
  function sumTotals(list, key) {
    const result = {};
    for (const d of list) {
      const t = d?.[key]?.totals || {};
      for (const k of Object.keys(t)) {
        result[k] = (result[k] || 0) + (t[k] || 0);
      }
    }
    return result;
  }
  function mergeDailyArr(list) {
    const map = {};
    for (const d of list) {
      for (const day of (d?.daily?.daily || [])) {
        if (!map[day.date]) map[day.date] = { ...day, totalCost: 0, inputTokens: 0, outputTokens: 0, cacheCreationTokens: 0, cacheReadTokens: 0, totalTokens: 0, modelBreakdowns: [] };
        map[day.date].totalCost += day.totalCost || 0;
        map[day.date].inputTokens += day.inputTokens || 0;
        map[day.date].outputTokens += day.outputTokens || 0;
        map[day.date].cacheCreationTokens += day.cacheCreationTokens || 0;
        map[day.date].cacheReadTokens += day.cacheReadTokens || 0;
        map[day.date].totalTokens += day.totalTokens || 0;
      }
    }
    return Object.values(map).sort((a, b) => a.date.localeCompare(b.date));
  }
  function mergeWeeklyArr(list) {
    const map = {};
    for (const d of list) {
      for (const w of (d?.weekly?.weekly || [])) {
        if (!map[w.week]) map[w.week] = { ...w, totalCost: 0, inputTokens: 0, outputTokens: 0, cacheCreationTokens: 0, cacheReadTokens: 0, totalTokens: 0, modelsUsed: [] };
        map[w.week].totalCost += w.totalCost || 0;
        map[w.week].inputTokens += w.inputTokens || 0;
        map[w.week].outputTokens += w.outputTokens || 0;
        map[w.week].cacheCreationTokens += w.cacheCreationTokens || 0;
        map[w.week].cacheReadTokens += w.cacheReadTokens || 0;
        map[w.week].totalTokens += w.totalTokens || 0;
        (w.modelsUsed || []).forEach(m => { if (!map[w.week].modelsUsed.includes(m)) map[w.week].modelsUsed.push(m); });
      }
    }
    return Object.values(map).sort((a, b) => a.week.localeCompare(b.week));
  }
  function mergeMonthlyArr(list) {
    const map = {};
    for (const d of list) {
      for (const m of (d?.monthly?.monthly || [])) {
        if (!map[m.month]) map[m.month] = { ...m, totalCost: 0, inputTokens: 0, outputTokens: 0, cacheCreationTokens: 0, cacheReadTokens: 0, totalTokens: 0, modelsUsed: [] };
        map[m.month].totalCost += m.totalCost || 0;
        map[m.month].inputTokens += m.inputTokens || 0;
        map[m.month].outputTokens += m.outputTokens || 0;
        map[m.month].cacheCreationTokens += m.cacheCreationTokens || 0;
        map[m.month].cacheReadTokens += m.cacheReadTokens || 0;
        map[m.month].totalTokens += m.totalTokens || 0;
        (m.modelsUsed || []).forEach(mo => { if (!map[m.month].modelsUsed.includes(mo)) map[m.month].modelsUsed.push(mo); });
      }
    }
    return Object.values(map).sort((a, b) => a.month.localeCompare(b.month));
  }

  const todayTotals = sumTotals(dataList, 'today');
  const todayBreakdowns = dataList.flatMap(d => (d?.today?.daily?.[0]?.modelBreakdowns || []));
  const dailyArr = mergeDailyArr(dataList);
  const weeklyArr = mergeWeeklyArr(dataList);
  const monthlyArr = mergeMonthlyArr(dataList);

  const calcTotals = (arr) => arr.reduce((t, r) => ({
    inputTokens: (t.inputTokens || 0) + r.inputTokens,
    outputTokens: (t.outputTokens || 0) + r.outputTokens,
    cacheCreationTokens: (t.cacheCreationTokens || 0) + r.cacheCreationTokens,
    cacheReadTokens: (t.cacheReadTokens || 0) + r.cacheReadTokens,
    totalTokens: (t.totalTokens || 0) + r.totalTokens,
    totalCost: (t.totalCost || 0) + r.totalCost,
  }), {});

  return {
    today: { daily: [{ totals: todayTotals, modelBreakdowns: todayBreakdowns }], totals: todayTotals },
    daily: { daily: dailyArr, totals: calcTotals(dailyArr) },
    weekly: { weekly: weeklyArr, totals: calcTotals(weeklyArr) },
    monthly: { monthly: monthlyArr, totals: calcTotals(monthlyArr) },
  };
}

// Get data based on current account selection
async function getDataForCurrentAccount() {
  if (__STATIC) return __STATIC;
  if (currentAccount === '__local__') return null; // use individual API calls
  if (currentAccount === '__all__') {
    // Local data
    const today_t = today();
    const [localToday, localDaily, localWeekly, localMonthly] = await Promise.all([
      api(`/api/today`),
      api(`/api/daily?since=${isoToYMD(document.getElementById('sinceDate').value)}&until=${isoToYMD(document.getElementById('untilDate').value)}`),
      api('/api/weekly'),
      api('/api/monthly'),
    ]);
    const localData = { today: localToday, daily: localDaily, weekly: localWeekly, monthly: localMonthly };
    // Remote data
    const remoteDatas = await Promise.all(remoteAccounts.map(acc => getRemoteData(acc.accountId)));
    return mergeAccounts([localData, ...remoteDatas]);
  }
  // Single remote account
  return await getRemoteData(currentAccount);
}

function timeAgo(date) {
  const mins = Math.floor((Date.now() - date) / 60000);
  if (mins < 60) return `${mins} 分钟前`;
  if (mins < 1440) return `${Math.floor(mins / 60)} 小时前`;
  return `${Math.floor(mins / 1440)} 天前`;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n) return '0';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function fmtCost(n) { return n ? '$' + n.toFixed(2) : '$0.00'; }
function fmtDate(s) { return s ? s.slice(5) : ''; } // "2026-04-23" → "04-23"
function todayISO() { return new Date().toISOString().slice(0, 10); }
function isoToYMD(s) { return s.replace(/-/g, ''); }
function daysAgoISO(n) { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }
function firstOfMonthISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }

function modelShort(name) {
  if (!name) return name;
  const n = name.toLowerCase();
  if (n.includes('opus'))   return 'Opus';
  if (n.includes('sonnet')) return 'Sonnet';
  if (n.includes('haiku'))  return 'Haiku';
  return name.split('-').slice(-2).join('-');
}
function modelTag(name) {
  const short = modelShort(name);
  const cls = short === 'Opus' ? 'mt-opus' : short === 'Haiku' ? 'mt-haiku' : 'mt-sonnet';
  return `<span class="mtag ${cls}">${short}</span>`;
}
function modelColor(name) {
  if (!name) return '#94a3b8';
  const n = name.toLowerCase();
  if (n.includes('opus'))   return '#a78bfa';
  if (n.includes('sonnet')) return '#60a5fa';
  if (n.includes('haiku'))  return '#34d399';
  return '#94a3b8';
}

const spinner = `<div class="loading"><svg class="spinning" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9"/></svg>加载中…</div>`;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Chart ─────────────────────────────────────────────────────────────────────
let dailyChart = null;

function renderDailyChart(days) {
  const wrap = document.getElementById('dailyChartWrap');
  if (!days || days.length === 0) { wrap.innerHTML = '<div class="empty">该时间段内无数据</div>'; return; }

  wrap.innerHTML = '<canvas id="dailyCanvas"></canvas>';
  const labels  = days.map(d => fmtDate(d.date));
  const costArr = days.map(d => +(d.totalCost || 0).toFixed(4));

  if (dailyChart) { dailyChart.destroy(); dailyChart = null; }
  dailyChart = new Chart(document.getElementById('dailyCanvas').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Input',        data: days.map(d => d.inputTokens || 0),        backgroundColor: '#f59e0b', stack: 't', order: 2 },
        { label: 'Output',       data: days.map(d => d.outputTokens || 0),       backgroundColor: '#10b981', stack: 't', order: 2 },
        { label: 'Cache Create', data: days.map(d => d.cacheCreationTokens || 0), backgroundColor: '#8b5cf6', stack: 't', order: 2 },
        { label: 'Cache Read',   data: days.map(d => d.cacheReadTokens || 0),    backgroundColor: '#3b82f6', stack: 't', order: 2 },
        {
          label: 'Cost ($)', data: costArr, type: 'line',
          borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,.1)',
          fill: true, tension: 0.3, pointRadius: 3, pointHoverRadius: 6,
          borderWidth: 2, yAxisID: 'y2', order: 1
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2236', borderColor: '#263047', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#94a3b8', padding: 12,
          callbacks: {
            label: (ctx) => ctx.dataset.label === 'Cost ($)'
              ? ` Cost: $${ctx.raw.toFixed(4)}`
              : ` ${ctx.dataset.label}: ${fmt(ctx.raw)}`
          }
        }
      },
      scales: {
        x: { stacked: true, grid: { color: 'rgba(38,48,71,.5)' }, ticks: { color: '#4a5568', font: { size: 11 }, maxTicksLimit: 12, maxRotation: 45 } },
        y: { stacked: true, grid: { color: 'rgba(38,48,71,.5)' }, ticks: { color: '#4a5568', font: { size: 11 }, callback: v => fmt(v) } },
        y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#f97316', font: { size: 11 }, callback: v => '$' + v.toFixed(2) } }
      }
    }
  });
}

// ── Load sections ─────────────────────────────────────────────────────────────
async function loadDaily() {
  const sinceVal = document.getElementById('sinceDate').value;
  const untilVal = document.getElementById('untilDate').value;
  document.getElementById('dailyChartWrap').innerHTML = spinner;
  try {
    let data;
    if (__STATIC) {
      const allDays = (__STATIC.daily || {}).daily || [];
      data = { daily: allDays.filter(d => d.date >= sinceVal && d.date <= untilVal) };
    } else if (currentAccount === '__local__') {
      data = await api(`/api/daily?since=${isoToYMD(sinceVal)}&until=${isoToYMD(untilVal)}`);
    } else if (currentAccount === '__all__') {
      const localDaily = await api(`/api/daily?since=${isoToYMD(sinceVal)}&until=${isoToYMD(untilVal)}`);
      const remoteDatas = await Promise.all(remoteAccounts.map(acc => getRemoteData(acc.accountId)));
      const merged = mergeAccounts([{ daily: localDaily }, ...remoteDatas]);
      data = { daily: (merged.daily.daily || []).filter(d => d.date >= sinceVal && d.date <= untilVal) };
    } else {
      const remote = await getRemoteData(currentAccount);
      data = { daily: (remote?.daily?.daily || []).filter(d => d.date >= sinceVal && d.date <= untilVal) };
    }
    renderDailyChart(data.daily || []);
  } catch (e) {
    document.getElementById('dailyChartWrap').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

async function loadToday() {
  try {
    let data;
    if (__STATIC) data = __STATIC.today;
    else if (currentAccount === '__local__') data = await api('/api/today');
    else if (currentAccount === '__all__') {
      const [localToday, ...remotes] = await Promise.all([api('/api/today'), ...remoteAccounts.map(a => getRemoteData(a.accountId))]);
      data = mergeAccounts([{ today: localToday }, ...remotes]).today;
    } else {
      const remote = await getRemoteData(currentAccount);
      data = remote?.today || {};
    }
    const t = data.totals || {};
    const day = (data.daily || [])[0];

    document.getElementById('todayCost').textContent     = fmtCost(t.totalCost);
    document.getElementById('todayTokens').textContent   = fmt(t.totalTokens || 0);
    document.getElementById('todayCostSub').textContent  = t.totalCost ? `Input ${fmt(t.inputTokens)} / Out ${fmt(t.outputTokens)}` : '今日暂无数据';
    document.getElementById('todayTokensSub').textContent = t.totalCost
      ? `CR: ${fmt(t.cacheReadTokens)} / CC: ${fmt(t.cacheCreationTokens)}`
      : '—';

    renderModelBreakdown(day ? (day.modelBreakdowns || []) : [], '今日');
  } catch (e) {
    ['todayCost','todayTokens'].forEach(id => document.getElementById(id).textContent = 'Err');
  }
}

// ── Model breakdown ───────────────────────────────────────────────────────────
function renderModelBreakdown(breakdowns, period) {
  const el = document.getElementById('modelContent');
  document.getElementById('modelPeriod').textContent = period || '今日';

  if (!breakdowns || !breakdowns.length) {
    el.innerHTML = '<div class="empty">暂无数据</div>'; return;
  }

  const totalCost   = breakdowns.reduce((s, m) => s + (m.cost || 0), 0);
  const totalTokens = breakdowns.reduce((s, m) =>
    s + (m.inputTokens||0) + (m.outputTokens||0) + (m.cacheCreationTokens||0) + (m.cacheReadTokens||0), 0);

  const html = breakdowns.map(m => {
    const tokens = (m.inputTokens||0)+(m.outputTokens||0)+(m.cacheCreationTokens||0)+(m.cacheReadTokens||0);
    const pct     = totalTokens > 0 ? (tokens / totalTokens * 100).toFixed(1) : 0;
    const costPct = totalCost   > 0 ? (m.cost   / totalCost   * 100).toFixed(0) : 0;
    const color   = modelColor(m.modelName);
    return `
      <div class="model-item">
        <div class="model-row-top">
          ${modelTag(m.modelName)}
          <span style="font-size:12px;color:var(--text2)">${fmtCost(m.cost)} <span style="color:var(--text3)">(${costPct}%)</span></span>
        </div>
        <div class="model-bar-bg">
          <div class="model-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="model-detail">
          <span>Input: ${fmt(m.inputTokens)}</span>
          <span>Output: ${fmt(m.outputTokens)}</span>
          <span>Cache R: ${fmt(m.cacheReadTokens)}</span>
          <span>Cache C: ${fmt(m.cacheCreationTokens)}</span>
          <span style="color:var(--text2)">共 ${fmt(tokens)} (${pct}%)</span>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = html;
}

    await loadAccountBar();

  }
  if (showSpin) setRefreshing(false);
}
